name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies (Linux)
      run: sudo apt-get update && sudo apt-get install -y libclang-dev clang libavcodec-dev libavformat-dev libswscale-dev libavutil-dev
    
    - name: Check formatting
      run: cargo fmt -- --check
    
    - name: Run clippy
      run: cargo clippy -- -D warnings
      
    - name: Build
      run: cargo build --verbose
      
    - name: Run tests
      run: cargo test --verbose

  build_windows_release:
    if: github.event_name == 'release'
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Release
      run: cargo build --release
      
    - name: Upload Release Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./target/release/posturewatch.exe
        asset_name: PostureWatch-Windows.exe
        asset_content_type: application/vnd.microsoft.portable-executable
