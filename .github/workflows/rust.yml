name: CI & Release

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            libclang-dev \
            libavcodec-dev \
            libavformat-dev \
            libswscale-dev \
            libavutil-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libgdk-pixbuf2.0-dev \
            libv4l-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Run coverage validation
        run: cargo llvm-cov --ignore-filename-regex "src/(main|camera|tray|alert|logging)\\.rs" --fail-under-lines 60 --codecov --output-path codecov.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: codecov.json
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: lextiz/PostureWatch

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install dependencies (macOS)
        run: |
          brew update
          brew install ffmpeg llvm

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --verbose

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci, build-macos]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release (exe)
        run: cargo build --release

      - name: Prepare release artifact
        shell: pwsh
        run: |
          if (Test-Path target/release/posturewatch.exe) {
            Copy-Item target/release/posturewatch.exe PostureWatch.exe
          } elseif (Test-Path target/release/PostureWatch.exe) {
            Copy-Item target/release/PostureWatch.exe PostureWatch.exe
          } else {
            throw 'Could not find release executable in target/release'
          }

      - name: Sign Windows executable
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw "Missing signing secrets: WINDOWS_CERTIFICATE_PFX_BASE64 and/or WINDOWS_CERTIFICATE_PASSWORD"
          }

          [IO.File]::WriteAllBytes("codesign.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64))
          signtool sign /fd SHA256 /f codesign.pfx /p $env:WINDOWS_CERTIFICATE_PASSWORD /tr http://timestamp.digicert.com /td SHA256 PostureWatch.exe
          signtool verify /pa /v PostureWatch.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.run_number }}
          name: Main build #${{ github.run_number }}
          generate_release_notes: true
          files: PostureWatch.exe

  release-macos:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [release]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release (macOS binary)
        run: cargo build --release

      - name: Prepare release artifact
        shell: bash
        run: |
          if [ -f target/release/posturewatch ]; then
            cp target/release/posturewatch PostureWatch-macos
          elif [ -f target/release/PostureWatch ]; then
            cp target/release/PostureWatch PostureWatch-macos
          else
            echo "Could not find release executable in target/release"
            exit 1
          fi
          chmod +x PostureWatch-macos

      - name: Import Apple signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Codesign macOS binary
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          if [ -z "${MACOS_CODESIGN_IDENTITY}" ]; then
            echo "Missing signing secret: MACOS_CODESIGN_IDENTITY"
            exit 1
          fi

          codesign --force --options runtime --timestamp --sign "${MACOS_CODESIGN_IDENTITY}" PostureWatch-macos
          codesign --verify --deep --strict --verbose=2 PostureWatch-macos
          spctl --assess --type execute --verbose=4 PostureWatch-macos

      - name: Notarize macOS binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [ -z "${APPLE_ID}" ] || [ -z "${APPLE_TEAM_ID}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD}" ]; then
            echo "Missing notarization secrets: APPLE_ID, APPLE_TEAM_ID, and/or APPLE_APP_SPECIFIC_PASSWORD"
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent PostureWatch-macos PostureWatch-macos.zip
          xcrun notarytool submit PostureWatch-macos.zip \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}" \
            --wait

      - name: Upload macOS binary to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.run_number }}
          files: |
            PostureWatch-macos
            PostureWatch-macos.zip
