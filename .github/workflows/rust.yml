name: CI & Release

on:
  pull_request:
  push:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            libclang-dev \
            libavcodec-dev \
            libavformat-dev \
            libswscale-dev \
            libavutil-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libgdk-pixbuf2.0-dev \
            libv4l-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Run coverage validation
        run: cargo llvm-cov --ignore-filename-regex "src/(main|camera|tray|alert|logging)\\.rs" --fail-under-lines 60 --codecov --output-path codecov.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: codecov.json
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: lextiz/PostureWatch

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install dependencies (macOS)
        run: |
          brew update
          brew install ffmpeg llvm

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build
        run: cargo build --verbose

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci, build-macos]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release (exe)
        run: cargo build --release

      - name: Sign Windows executable
        if: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("windows-cert.pfx", [Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}"))
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1).FullName

          if (-not $signtool) {
            throw "signtool.exe was not found on the runner"
          }

          & $signtool sign `
            /fd SHA256 `
            /td SHA256 `
            /tr http://timestamp.digicert.com `
            /f windows-cert.pfx `
            /p "${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" `
            target/release/posturewatch.exe

          Remove-Item windows-cert.pfx

      - name: Prepare release artifact
        shell: pwsh
        run: |
          if (Test-Path target/release/posturewatch.exe) {
            Copy-Item target/release/posturewatch.exe PostureWatch.exe
          } elseif (Test-Path target/release/PostureWatch.exe) {
            Copy-Item target/release/PostureWatch.exe PostureWatch.exe
          } else {
            throw 'Could not find release executable in target/release'
          }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.run_number }}
          name: Main build #${{ github.run_number }}
          generate_release_notes: true
          files: PostureWatch.exe

  release-macos:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [release]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release (macOS binary)
        run: cargo build --release

      - name: Sign macOS binary
        if: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.MACOS_CODESIGN_IDENTITY != '' }}
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > macos-cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import macos-cert.p12 \
            -k build.keychain \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          codesign --force --options runtime --timestamp --sign "$MACOS_CODESIGN_IDENTITY" target/release/posturewatch
          rm -f macos-cert.p12

      - name: Notarize macOS binary
        if: ${{ secrets.MACOS_NOTARY_APPLE_ID != '' && secrets.MACOS_NOTARY_TEAM_ID != '' && secrets.MACOS_NOTARY_APP_PASSWORD != '' && secrets.MACOS_CERTIFICATE_P12_BASE64 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.MACOS_CODESIGN_IDENTITY != '' }}
        env:
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_APP_PASSWORD: ${{ secrets.MACOS_NOTARY_APP_PASSWORD }}
        run: |
          ditto -c -k --keepParent target/release/posturewatch posturewatch-macos.zip
          xcrun notarytool submit posturewatch-macos.zip \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --password "$MACOS_NOTARY_APP_PASSWORD" \
            --wait
          rm -f posturewatch-macos.zip

      - name: Prepare release artifact
        shell: bash
        run: |
          if [ -f target/release/posturewatch ]; then
            cp target/release/posturewatch PostureWatch-macos
          elif [ -f target/release/PostureWatch ]; then
            cp target/release/PostureWatch PostureWatch-macos
          else
            echo "Could not find release executable in target/release"
            exit 1
          fi
          chmod +x PostureWatch-macos

      - name: Upload macOS binary to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.run_number }}
          files: PostureWatch-macos
