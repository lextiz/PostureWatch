name: Rust CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang libavcodec-dev libavformat-dev libswscale-dev libavutil-dev libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev libv4l-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang libavcodec-dev libavformat-dev libswscale-dev libavutil-dev libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev libv4l-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --verbose

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang libavcodec-dev libavformat-dev libswscale-dev libavutil-dev libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev libv4l-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --verbose
