name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev libv4l-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libclang-dev libssl-dev cmake zip

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: |
          cargo build --release

      - name: Package for Windows
        run: |
          mkdir -p release
          cp target/release/posturewatch release/posturewatch.exe
          echo "@echo off" > release/install.bat
          echo "echo PostureWatch Installer" >> release/install.bat
          echo "echo Please run posturewatch.exe to start" >> release/install.bat
          echo "pause" >> release/install.bat
          zip -r PostureWatch-Windows.zip release/

      - name: Create git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag -d v0.9.11 || true
          git tag v0.9.11
          git push origin v0.9.11

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PostureWatch-Windows.zip
          body: PostureWatch release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
