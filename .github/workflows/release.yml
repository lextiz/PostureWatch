name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev libv4l-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libclang-dev libssl-dev cmake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build release
        run: |
          cargo build --release

      - name: Package for Windows
        run: |
          mkdir -p release
          cp target/release/posturewatch release/
          echo "@echo off" > release/install.bat
          echo "echo PostureWatch Installer" >> release/install.bat
          echo "echo Please run posturewatch.exe to start" >> release/install.bat
          echo "pause" >> release/install.bat
          zip -r PostureWatch-Windows.zip release/
          ls -la PostureWatch-Windows.zip

      - name: Create and Upload GitHub Release
        run: |
          # Extract tag name
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "Creating release for tag: $TAG_NAME"
          
          # Create release via API
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$TAG_NAME\",\"name\":\"Release $TAG_NAME\",\"draft\":false}")
          
          echo "Create response: $RESPONSE"
          
          # Get upload URL
          UPLOAD_URL=$(echo "$RESPONSE" | grep -o '"upload_url":"[^"]*' | sed 's/"upload_url":"//' | sed 's/{?name,label}//')
          echo "Upload URL: $UPLOAD_URL"
          
          # Upload asset
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/zip" \
            "${UPLOAD_URL}?name=PostureWatch-Windows.zip" \
            --data-binary @PostureWatch-Windows.zip
          
          echo "Release created successfully"
