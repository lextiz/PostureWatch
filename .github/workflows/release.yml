name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: |
          cargo build --release

      - name: Package for Windows
        run: |
          if (Test-Path release) { Remove-Item release -Recurse -Force }
          New-Item -ItemType Directory -Path release
          copy target\release\posturewatch.exe release\ 2>$null || copy target\release\PostureWatch.exe release\ 2>$null || copy target\release\*.exe release\ 2>$null
          echo @echo off > release\install.bat
          echo echo PostureWatch Installer >> release\install.bat
          echo echo Please run posturewatch.exe to start >> release\install.bat
          echo pause >> release\install.bat
          powershell -Command "Compress-Archive -Path release -DestinationPath PostureWatch-Windows.zip -Force"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: PostureWatch-Windows.zip
          body: PostureWatch Windows release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
