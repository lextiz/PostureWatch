name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release (exe)
        run: |
          cargo build --release --exe

      - name: Package for Windows
        run: |
          if (Test-Path release) { Remove-Item release -Recurse -Force }
          New-Item -ItemType Directory -Path release
          copy target\release\posturewatch.exe release\
          echo @echo off > release\install.bat
          echo echo PostureWatch Installer >> release\install.bat
          echo echo Please run posturewatch.exe to start >> release\install.bat
          echo pause >> release\install.bat
          powershell -Command "Compress-Archive -Path release -DestinationPath PostureWatch-Windows.zip -Force"
          dir PostureWatch-Windows.zip

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./PostureWatch-Windows.zip
          asset_name: PostureWatch-Windows.zip
          asset_content_type: application/zip

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: PostureWatch release
