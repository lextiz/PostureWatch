name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minimal:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello world"

  build_and_release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: |
          cargo build --release

      - name: Package for Windows
        run: |
          mkdir release
          copy target\release\posturewatch.exe release\
          echo @echo off > release\install.bat
          echo echo PostureWatch Installer >> release\install.bat
          echo echo Please run posturewatch.exe to start >> release\install.bat
          echo pause >> release\install.bat
          powershell -Command "Compress-Archive -Path release -DestinationPath PostureWatch-Windows.zip -Force"

      - name: Configure gh CLI
        shell: pwsh
        run: |
          $env:GITHUB_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
          echo "$env:GITHUB_TOKEN" | gh auth login --with-token
          gh auth status

      - name: Create GitHub Release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -like "refs/tags/*") {
            $tag = "${{ github.ref }}".Replace("refs/tags/", "")
          } else {
            $tag = "v0.9.5"
          }
          Write-Host "Creating release for tag: $tag"
          $existing = gh release view $tag 2>$null
          if ($existing) {
            Write-Host "Release $tag exists, uploading..."
            gh release upload $tag ./PostureWatch-Windows.zip --force
          } else {
            gh release create $tag --title "Release $tag" --notes "PostureWatch release" ./PostureWatch-Windows.zip
          }
