name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev libv4l-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libclang-dev libssl-dev cmake zip mingw-w64

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Windows target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Build release (exe)
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Package for Windows
        run: |
          mkdir -p release
          cp target/x86_64-pc-windows-gnu/release/posturewatch.exe release/ 2>/dev/null || cp target/x86_64-pc-windows-gnu/release/PostureWatch.exe release/ 2>/dev/null
          ls -la release/
          echo '@echo off' > release/install.bat
          echo 'echo PostureWatch Installer' >> release/install.bat
          echo 'echo Please run posturewatch.exe to start' >> release/install.bat
          echo 'pause' >> release/install.bat
          zip -r PostureWatch-Windows.zip release/
          ls -la PostureWatch-Windows.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: PostureWatch-Windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
