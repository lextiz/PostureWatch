name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minimal:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello world"

  build_and_release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: |
          cargo build --release

      - name: Package for Windows
        run: |
          if (Test-Path release) { Remove-Item release -Recurse -Force }
          New-Item -ItemType Directory -Path release
          copy target\release\posturewatch.exe release\
          echo @echo off > release\install.bat
          echo echo PostureWatch Installer >> release\install.bat
          echo echo Please run posturewatch.exe to start >> release\install.bat
          echo pause >> release\install.bat
          powershell -Command "Compress-Archive -Path release -DestinationPath PostureWatch-Windows.zip -Force"

      - name: Set tag name
        id: set_tag
        run: |
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -like "refs/tags/*") {
            $tag = "${{ github.ref }}".Replace("refs/tags/", "")
          } else {
            $tag = "v0.9.9"
          }
          Write-Host "tag_name=$tag" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: PostureWatch-Windows.zip
          tag_name: ${{ steps.set_tag.outputs.tag_name }}
          name: Release ${{ steps.set_tag.outputs.tag_name }}
          body: PostureWatch release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
