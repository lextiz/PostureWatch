name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev libv4l-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libclang-dev libssl-dev cmake zip

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: |
          cargo build --release

      - name: Package for Windows
        run: |
          mkdir -p release
          cp target/release/posturewatch release/posturewatch.exe
          echo "@echo off" > release/install.bat
          echo "echo PostureWatch Installer" >> release/install.bat
          echo "echo Please run posturewatch.exe to start" >> release/install.bat
          echo "pause" >> release/install.bat
          zip -r PostureWatch-Windows.zip release/

      - name: Configure gh CLI
        run: |
          gh auth login --with-token <<< "$GITHUB_TOKEN"

      - name: Create git tag and release
        run: |
          # For workflow_dispatch, create a tag
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git tag -d v0.9.12 2>/dev/null || true
            git tag v0.9.12
            git push origin v0.9.12
          fi
          
          # Wait for tag to be available
          sleep 5
          
          # Create release using gh CLI with the correct tag
          TAG_NAME=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.9.12")
          gh release create "$TAG_NAME" --title "Release $TAG_NAME" --notes "PostureWatch release" PostureWatch-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
