name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev libv4l-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libclang-dev libssl-dev cmake

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build release
        run: |
          cargo build --release

      - name: Package for Windows
        run: |
          mkdir -p release
          cp target/release/posturewatch release/
          echo "@echo off" > release/install.bat
          echo "echo PostureWatch Installer" >> release/install.bat
          echo "echo Please run posturewatch.exe to start" >> release/install.bat
          echo "pause" >> release/install.bat
          zip -r PostureWatch-Windows.zip release/
          ls -la PostureWatch-Windows.zip

      - name: Configure gh CLI
        run: |
          echo "Configuring gh CLI..."
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          gh auth status

      - name: Create GitHub Release
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "Creating release for tag: $TAG_NAME"
          gh release create "$TAG_NAME" --title "Release $TAG_NAME" --notes "PostureWatch release" ./PostureWatch-Windows.zip
