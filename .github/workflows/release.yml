name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minimal:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello world"

  build_and_release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: |
          cargo build --release

      - name: Package for Windows
        run: |
          if (Test-Path release) { Remove-Item release -Recurse -Force }
          New-Item -ItemType Directory -Path release
          copy target\release\posturewatch.exe release\
          echo @echo off > release\install.bat
          echo echo PostureWatch Installer >> release\install.bat
          echo echo Please run posturewatch.exe to start >> release\install.bat
          echo pause >> release\install.bat
          powershell -Command "Compress-Archive -Path release -DestinationPath PostureWatch-Windows.zip -Force"
          dir PostureWatch-Windows.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref }}" -like "refs/tags/*") {
            $tag = "${{ github.ref }}".Replace("refs/tags/", "")
          } else {
            $tag = "v0.9.7"
          }
          Write-Host "Creating release for tag: $tag"
          
          # Create release first (without asset)
          $body = @{
            tag_name = $tag
            name = "Release $tag"
            body = "PostureWatch release"
          } | ConvertTo-Json
          
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/lextiz/PostureWatch/releases" `
            -Method POST `
            -Headers @{ "Authorization" = "Bearer $env:GH_TOKEN"; "Accept" = "application/vnd.github+json" } `
            -Body $body
          
          Write-Host "Release created: $($release.html_url)"
          
          # Upload asset using upload URL
          $fileBytes = [System.IO.File]::ReadAllBytes("PostureWatch-Windows.zip")
          $uploadUrl = "$($release.upload_url.Replace('{?name,label}', ''))?name=PostureWatch-Windows.zip"
          
          $response = Invoke-RestMethod -Uri $uploadUrl `
            -Method POST `
            -Headers @{
              "Authorization" = "Bearer $env:GH_TOKEN"
              "Content-Type" = "application/zip"
            } `
            -Body $fileBytes
          
          Write-Host "Asset uploaded successfully"
          Write-Host "  Name: $($response.name)"
          Write-Host "  Size: $($response.size) bytes"
