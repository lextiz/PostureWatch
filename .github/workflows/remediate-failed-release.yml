name: Remediate failed release

on:
  workflow_run:
    workflows: ["Build and Release"]
    types:
      - completed

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  create-hotfix-branch:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create hotfix branch and notify
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run
            const sha = run.head_sha
            const runId = run.id
            const repo = context.repo
            const short = sha ? sha.slice(0,7) : (new Date()).toISOString().replace(/[:.]/g,'-')
            const branchName = `hotfix/release-failure-${short}`
            console.log('Creating branch', branchName, 'from', sha)
            await github.rest.git.createRef({ owner: repo.owner, repo: repo.repo, ref: `refs/heads/${branchName}`, sha: sha })
            const issue = await github.rest.issues.create({ owner: repo.owner, repo: repo.repo, title: `Hotfix branch for failed release: ${branchName}`, body: `A release workflow run (id: ${runId}) failed. A hotfix branch was created from commit ${sha} as ${branchName} for investigation and quick fixes.` })
            await github.rest.actions.createWorkflowRunComment({ owner: repo.owner, repo: repo.repo, run_id: runId, body: `A hotfix branch was created: ${branchName}. Issue: ${issue.html_url}` })
