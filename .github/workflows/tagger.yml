name: Preflight Tagger

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to tag'
        required: true
        default: 'main'
      tag:
        description: 'Tag name to create (e.g. v0.1.2-fix-camera-...)'
        required: true

permissions:
  contents: write

jobs:
  preflight-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y build-essential pkg-config libglib2.0-dev libgtk-3-dev libgdk-pixbuf2.0-dev libv4l-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libclang-dev libssl-dev cmake

      - name: Build release (preflight)
        run: |
          cargo build --release

      - name: Create tag and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG=${{ github.event.inputs.tag }}
          echo "Creating annotated tag $TAG at branch ${{ github.event.inputs.branch }}"
          git tag -a "$TAG" -m "Release $TAG (created by preflight workflow)"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} refs/tags/$TAG

      - name: Create GitHub release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

