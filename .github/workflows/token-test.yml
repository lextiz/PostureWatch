name: Token Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check token
        run: |
          echo "Token present: ${{ secrets.GITHUB_TOKEN != '' }}"
          echo "Token first 10 chars: ${{ secrets.GITHUB_TOKEN }}"
      - name: Check job
        run: echo "Job executed"